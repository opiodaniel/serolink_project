{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="text-danger fw-bold">Welcome Back</h2>
                    <p class="text-muted">Login to your SeroLink account</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Your username and password didn't match. Please try again.
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control">
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" required id="id_password" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-danger btn-lg w-100 mb-3">Login</button>
                    
                    <div class="text-center">
                        <p class="small text-muted">Don't have an account? <a href="{% url 'signup' %}" class="text-danger">Sign up here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
